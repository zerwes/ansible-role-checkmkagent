---
- name: Converge
  hosts: all
  vars:
    ansible_python_interpreter: /usr/bin/python3
    checkmk_edition_name: "{{ checkmk_agent_version is version_compare('2.5', '>=') | ternary('community', 'raw') }}"
    checkmk_edition_dirname: "{{ checkmk_agent_version is version_compare('2.5', '>=') | ternary('community', 'cre') }}"  # edition dir name in the extracted server deb
  pre_tasks:
    - name: print ansible version
      ansible.builtin.debug:
        msg: "{{ ansible_version.full }}"
    - name: print check_mk_agent_use_systemd
      ansible.builtin.debug:
        msg: "{{ check_mk_agent_use_systemd | bool }}"
    - name: print checkmk_agent_version
      ansible.builtin.debug:
        var: checkmk_agent_version
    - name: print checkmk_edition_name
      ansible.builtin.debug:
        var: checkmk_edition_name
    - name: "fetch server deb ..."
      get_url:
        url: "https://download.checkmk.com/checkmk/{{ checkmk_agent_version }}/check-mk-{{ checkmk_edition_name }}-{{ checkmk_agent_version }}_0.{{ ansible_distribution_release }}_amd64.deb"
        dest: "/var/tmp//check-mk-{{ checkmk_edition_name }}-{{ checkmk_agent_version }}_0.{{ ansible_distribution_release }}_amd64.deb"
        force: false
        mode: 0600
    - name: "extract server deb ..."
      command: "dpkg-deb -x /var/tmp/check-mk-{{ checkmk_edition_name }}-{{ checkmk_agent_version }}_0.{{ ansible_distribution_release }}_amd64.deb /var/tmp/check-mk-{{ checkmk_edition_name }}"
      args:
        creates: "/var/tmp/check-mk-{{ checkmk_edition_name }}/opt/omd/versions/{{ checkmk_agent_version }}.{{ checkmk_edition_dirname }}/share/check_mk/agents/{{ checkmk_agent_deb }}"
    - name: "get agent dep from extracted files ..."
      copy:
        src: "/var/tmp/check-mk-{{ checkmk_edition_name }}/opt/omd/versions/{{ checkmk_agent_version }}.{{ checkmk_edition_dirname }}/share/check_mk/agents/{{ checkmk_agent_deb }}"
        dest: "/var/tmp/{{ checkmk_agent_deb }}"
        mode: 0600
        remote_src: true
  tasks:
    - name: "Include ansible-role-checkmkagent"
      include_role:
        name: "ansible-role-checkmkagent"
  post_tasks:
    - name: "Install netcat-openbsd"
      apt:
        name: netcat-openbsd
    - name: "Test checkmk agent"
      command: /bin/nc.openbsd -N -w 5 127.0.0.1 6556
      register: nc
      changed_when: false
    - assert:
        that:
          - nc.stdout_lines[0] == '<<<check_mk>>>'
